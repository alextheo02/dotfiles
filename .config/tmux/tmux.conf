# =============================================================================
# tmux.conf — Windows Terminal-style behavior
# =============================================================================

# -----------------------------------------------------------------------------
# GENERAL
# -----------------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 30000
set -sg escape-time 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on


# -----------------------------------------------------------------------------
# MOUSE
# -----------------------------------------------------------------------------

set -g mouse on

bind -n MouseDown1Pane select-pane -t = \; send-keys -M

bind -n WheelUpPane if-shell -F "#{mouse_any_flag}" \
    "send-keys -M" \
    "if-shell -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

bind -n WheelDownPane select-pane -t= \; send-keys -M

bind -n DoubleClick1Pane \
    select-pane -t = \; \
    copy-mode -M \; \
    send-keys -X select-word \; \
    send-keys -X copy-pipe-no-clear "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || clip.exe 2>/dev/null || true"

bind -n TripleClick1Pane \
    select-pane -t = \; \
    copy-mode -M \; \
    send-keys -X select-line \; \
    send-keys -X copy-pipe-no-clear "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || clip.exe 2>/dev/null || true"


# -----------------------------------------------------------------------------
# COPY MODE
# -----------------------------------------------------------------------------

setw -g mode-keys vi

bind -n C-S-Up copy-mode

# v / V / Ctrl+v for selection modes
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ---------------------------------------------------------------------------
# Shift+arrow selection — works like VS Code / Notepad / Windows Terminal
#
# The key insight: begin-selection RESETS the anchor every call.
# So we must use #{selection_present} to only call it on the FIRST press.
# After that, we just move — the selection extends from the original anchor.
#
# Pattern for every Shift+movement:
#   if selection_present → just move
#   else                 → begin-selection, then move
# ---------------------------------------------------------------------------

bind -T copy-mode-vi S-Up \
    if -F "#{selection_present}" \
        "send-keys -X cursor-up" \
        "send-keys -X begin-selection \; send-keys -X cursor-up"

bind -T copy-mode-vi S-Down \
    if -F "#{selection_present}" \
        "send-keys -X cursor-down" \
        "send-keys -X begin-selection \; send-keys -X cursor-down"

bind -T copy-mode-vi S-Left \
    if -F "#{selection_present}" \
        "send-keys -X cursor-left" \
        "send-keys -X begin-selection \; send-keys -X cursor-left"

bind -T copy-mode-vi S-Right \
    if -F "#{selection_present}" \
        "send-keys -X cursor-right" \
        "send-keys -X begin-selection \; send-keys -X cursor-right"

# Ctrl+Shift+Left/Right — select word by word
bind -T copy-mode-vi C-S-Left \
    if -F "#{selection_present}" \
        "send-keys -X previous-word" \
        "send-keys -X begin-selection \; send-keys -X previous-word"

bind -T copy-mode-vi C-S-Right \
    if -F "#{selection_present}" \
        "send-keys -X next-word-end" \
        "send-keys -X begin-selection \; send-keys -X next-word-end"

# Shift+Home / Shift+End — select to line start/end
bind -T copy-mode-vi S-Home \
    if -F "#{selection_present}" \
        "send-keys -X back-to-indentation" \
        "send-keys -X begin-selection \; send-keys -X back-to-indentation"

bind -T copy-mode-vi S-End \
    if -F "#{selection_present}" \
        "send-keys -X end-of-line" \
        "send-keys -X begin-selection \; send-keys -X end-of-line"

# Shift+PageUp / Shift+PageDown — select whole pages
bind -T copy-mode-vi S-PageUp \
    if -F "#{selection_present}" \
        "send-keys -X page-up" \
        "send-keys -X begin-selection \; send-keys -X page-up"

bind -T copy-mode-vi S-PageDown \
    if -F "#{selection_present}" \
        "send-keys -X page-down" \
        "send-keys -X begin-selection \; send-keys -X page-down"


# --- Copy to system clipboard ---

bind -T copy-mode-vi y \
    send-keys -X copy-pipe-and-cancel \
    "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || clip.exe 2>/dev/null || true"

bind -T copy-mode-vi Enter \
    send-keys -X copy-pipe-and-cancel \
    "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || clip.exe 2>/dev/null || true"

# Ctrl+C: copy and exit copy mode
bind -T copy-mode-vi C-c \
    send-keys -X copy-pipe-and-cancel \
    "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || clip.exe 2>/dev/null || true"


# --- Persistent mouse selection ---
# Drag ends: copy but stay in copy mode (highlight persists)
bind -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-no-clear \
    "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || clip.exe 2>/dev/null || true"

# Right-click in copy mode: copy and exit
bind -T copy-mode-vi MouseDown3Pane \
    send-keys -X copy-pipe-and-cancel \
    "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || clip.exe 2>/dev/null || true"

# Left-click in copy mode: cancel and exit
bind -T copy-mode-vi MouseDown1Pane send-keys -X cancel

# Right-click outside copy mode: paste from system clipboard
bind -n MouseDown3Pane run \
    "tmux set-buffer -- \"$(xclip -out -selection clipboard 2>/dev/null || xsel --clipboard --output 2>/dev/null || powershell.exe -command 'Get-Clipboard' 2>/dev/null || true)\"; tmux paste-buffer"


# --- Navigation (no selection) ---

bind -T copy-mode-vi Up    send-keys -X cursor-up
bind -T copy-mode-vi Down  send-keys -X cursor-down
bind -T copy-mode-vi Left  send-keys -X cursor-left
bind -T copy-mode-vi Right send-keys -X cursor-right

bind -T copy-mode-vi PageUp   send-keys -X page-up
bind -T copy-mode-vi PageDown send-keys -X page-down
bind -n S-PageUp copy-mode \; send-keys -X page-up

bind -T copy-mode-vi C-Home send-keys -X history-top
bind -T copy-mode-vi C-End  send-keys -X history-bottom

bind -T copy-mode-vi C-Left  send-keys -X previous-word
bind -T copy-mode-vi C-Right send-keys -X next-word-end

bind -T copy-mode-vi Home send-keys -X back-to-indentation
bind -T copy-mode-vi End  send-keys -X end-of-line

bind -T copy-mode-vi / command-prompt -p "Search forward:"  "send-keys -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "Search backward:" "send-keys -X search-backward '%%'"
bind -T copy-mode-vi n send-keys -X search-again
bind -T copy-mode-vi N send-keys -X search-reverse

bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q      send-keys -X cancel


# -----------------------------------------------------------------------------
# PASTE
# -----------------------------------------------------------------------------

bind -n C-S-v run \
    "tmux set-buffer -- \"$(xclip -out -selection clipboard 2>/dev/null || xsel --clipboard --output 2>/dev/null || powershell.exe -command 'Get-Clipboard' 2>/dev/null || true)\"; tmux paste-buffer"

bind p paste-buffer


# -----------------------------------------------------------------------------
# STATUS BAR
# -----------------------------------------------------------------------------

set -g status-position bottom
set -g status-style "bg=#1e1e1e fg=#cccccc"
set -g status-left  "#[fg=#569cd6,bold] #S "
set -g status-right "#[fg=#858585] %H:%M  %d %b "
set -g window-status-current-style "fg=#ffffff bg=#264f78 bold"
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style            "fg=#3c3c3c"
set -g pane-active-border-style     "fg=#569cd6"


# -----------------------------------------------------------------------------
# KEYBINDS
# -----------------------------------------------------------------------------
bind f display-popup -E -w 100% -h 100% -b none "~/.config/scripts/tmux_sessions.sh"
bind c run-shell '~/.config/scripts/tmux-smart-new-window.sh "#{pane_current_command}" "#{pane_pid}" "#{pane_current_path}"'
bind H display-popup -d "#{pane_current_path}" -x C -y C -w 70% -h 40% -E -b none "~/.config/scripts/remux.sh"
bind C new-window -c "#{pane_current_path}"
bind R source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded"
bind % run-shell "~/.config/scripts/tmux-smart-split.sh h '#{pane_current_command}' '#{pane_pid}'"
bind \" run-shell "~/.config/scripts/tmux-smart-split.sh v '#{pane_current_command}' '#{pane_pid}'"

